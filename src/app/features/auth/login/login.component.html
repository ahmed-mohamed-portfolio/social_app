<section
  class="flex justify-center dark:bg-gray-500 sm:m-6 sm:mt-24 md:py-10 md:mt-12 items-center mt-36"
>
  <div class="flex flex-col justify-center items-center">
    <img src="/logo.png" alt="" />
    <form
      class="w-[85%] max-w-80 py-5 p-2 md:w-full lg:max-w-96 xl:max-w-sm"
      [formGroup]="loginForm"
      (ngSubmit)="loginSubmit()"
    >
      <!-- email input -->
      <app-input
        [control]="loginForm.get('email')"
        [typeInput]="'email'"
        [idInput]="'email'"
        [placeHolder]="'ahmed.mohamed@gmail.com'"
        [labelInput]="'Email address'"
      ></app-input>

      <!-- password input -->
      <app-input
        [control]="loginForm.get('password')"
        [idInput]="'password'"
        [placeHolder]="'•••••••••'"
        [labelInput]="'Password'"
      >
        assword must be at least 8 characters, include uppercase, lowercase, number, and special
        character.
      </app-input>

      <button
        type="submit"
        class="w-full cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-lg px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
      >
        Log in
      </button>

      <button
        (click)="loginWithGoogle()"
        type="button"
        class="flex justify-center text-center cursor-pointer w-full mt-3 rounded-lg text-white bg-[#4285F4] hover:bg-[#4285F4]/90 focus:ring-4 focus:outline-none focus:ring-[#4285F4]/50 box-border border border-transparent font-medium leading-5 text-sm px-12 py-2.5 inline-flex items-center dark:focus:ring-[#4285F4]/55"
      >
        <svg
          class="w-4 h-4 me-1.5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            fill-rule="evenodd"
            d="M12.037 21.998a10.313 10.313 0 0 1-7.168-3.049 9.888 9.888 0 0 1-2.868-7.118 9.947 9.947 0 0 1 3.064-6.949A10.37 10.37 0 0 1 12.212 2h.176a9.935 9.935 0 0 1 6.614 2.564L16.457 6.88a6.187 6.187 0 0 0-4.131-1.566 6.9 6.9 0 0 0-4.794 1.913 6.618 6.618 0 0 0-2.045 4.657 6.608 6.608 0 0 0 1.882 4.723 6.891 6.891 0 0 0 4.725 2.07h.143c1.41.072 2.8-.354 3.917-1.2a5.77 5.77 0 0 0 2.172-3.41l.043-.117H12.22v-3.41h9.678c.075.617.109 1.238.1 1.859-.099 5.741-4.017 9.6-9.746 9.6l-.215-.002Z"
            clip-rule="evenodd"
          />
        </svg>
        login with Google
      </button>

      <div id="google-btn" class="hidden"></div>

      <hr class="h-px my-8 bg-gray-200 border-0 dark:bg-gray-700" />

      <p>
        Don’t have an account?
        <a routerLink="/register" class="cursor-pointer underline text-blue-600">Sign up</a>
      </p>
    </form>
  </div>

  <img
    class="hidden sm:w-[50%] sm:block md:w-[40%] lg:w-[30%] xl:w-[25%]"
    src="/login.png"
    alt=""
  />
</section>
